market:
  name: "Vinhomes Hanoi secondary market"
  city: "Hà Nội"
  caveat: "Ước tính dựa trên giá rao công khai đã lọc nhiễu; chưa phải giá giao dịch chốt tuyệt đối."

crawl:
  source: "batdongsan"
  direct_fetch_first: false
  reader_fallback_enabled: true
  reuse_existing_fetch: true
  discover_related_filters: true
  related_filter_links_per_page: 5
  allow_project_from_confirmed_page: true
  reader_prefix: "https://r.jina.ai/http://r.jina.ai/http://"
  request_timeout_seconds: 10
  delay_seconds: 0.4
  max_pages_per_run: 100
  pagination_pages_per_seed: 6
  expand_seed_pagination: true
  discover_listing_links: true
  listing_links_per_page: 24
  user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/125 Safari/537.36"
  extra_pages:
    - source: "vinhomesonline"
      pagination: "query_page"
      max_pages: 3
      purpose: "sale"
      property_type: "other"
      url: "https://vinhomesonline.vn/thu-cap"
    - source: "vinhomesonline"
      pagination: "query_page"
      max_pages: 3
      purpose: "sale"
      property_type: "other"
      url: "https://vinhomesonline.vn/so-cap"
    - source: "vinhomesonline"
      pagination: "query_page"
      max_pages: 2
      purpose: "rent"
      property_type: "other"
      url: "https://vinhomesonline.vn/leasing/estate-for-rent"

quality:
  sale_price_per_m2_min_vnd: 15000000
  sale_price_per_m2_max_vnd: 450000000
  rent_monthly_min_vnd: 1000000
  rent_monthly_max_vnd: 300000000
  stale_after_days: 45

valuation:
  min_strong_sample_size: 50
  min_medium_sample_size: 15
  comparable_limit: 8
  fallback_project_scope: true
  quantiles: [0.1, 0.5, 0.9]

realtime:
  jobs:
    - source: "batdongsan"
      interval_minutes: 30
      limit: 60
    - source: "onehousing"
      interval_minutes: 60
      limit: 35
    - source: "vinhomesonline"
      interval_minutes: 120
      limit: 24
    - source: "vinhomesland"
      interval_minutes: 360
      limit: 4

